# custom_botsort.yaml
# BoT-SORT Configuration for Odin's Eye — WILDTRACK Pedestrian Tracking
#
# Based on ultralytics default botsort.yaml with tunings for:
#   - Static cameras (WILDTRACK is fixed mount)
#   - ~2 fps effective frame rate
#   - Dense outdoor crowds
#
# We disable BoT-SORT's built-in ReID (with_reid: False) because
# we handle ReID ourselves via OSNet-AIN centralized batch extraction.

tracker_type: botsort

# Detection thresholds
track_high_thresh: 0.25      # First-stage match: confident detections
track_low_thresh: 0.1        # Second-stage: recover low-score partials
new_track_thresh: 0.4        # Start new track only if confident (prevents ghost tracks)

# Track persistence
track_buffer: 30             # Frames to keep lost tracks alive (30 = 15s at 2fps)

# Association
match_thresh: 0.8            # IoU-based matching threshold
fuse_score: True             # Fuse detection score into association cost

# Camera Motion Compensation
gmc_method: sparseOptFlow    # Sparse optical flow for CMC

# ReID — DISABLED (we use our own OSNet-AIN extractor in centralized batch)
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
